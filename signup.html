<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampCal | Sign Up</title>
    <link rel="stylesheet" href="includes/style.css" />
</head>
<body>
    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Create Your Account</h2>
            <p>Set up your CampCal profile</p>

            <input id="signupFirstName" type="text" placeholder="First name" />
            <input id="signupLastName" type="text" placeholder="Last name" />
            <input id="signupPhone" type="text" placeholder="Phone Number" />
            <input id="signupEmail" type="email" placeholder="Email" />

            <select id="signupCollege" class="auth-select">
                <option value="Liberty University">Liberty University</option>
                <option value="University of Virginia">University of Virginia</option>
                <option value="Virginia Tech">Virginia Tech</option>
            </select>

            <button id="signupSubmit" class="auth-btn auth-btn-primary">Sign Up</button>
            <button id="goToLogin" class="auth-btn auth-btn-secondary">Back to Log In</button>
        </div>
    </div>

   <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');
            const signupSubmit = document.getElementById('signupSubmit');
            const goToLogin = document.getElementById('goToLogin');
            const signupPhone = document.getElementById('signupPhone');

            function formatPhoneNumber(value) {
                const digits = value.replace(/\D/g, '').substring(0, 10);

                const part1 = digits.substring(0, 3);
                const part2 = digits.substring(3, 6);
                const part3 = digits.substring(6, 10);

                if (digits.length > 6) {
                    return `(${part1}) ${part2}-${part3}`;
                } else if (digits.length > 3) {
                    return `(${part1}) ${part2}`;
                } else if (digits.length > 0) {
                    return `(${part1}`;
                }

                return '';
            }

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }

            signupPhone.addEventListener('input', () => {
                signupPhone.value = formatPhoneNumber(signupPhone.value);
            });

            signupSubmit.addEventListener('click', () => {
                const firstName = document.getElementById('signupFirstName').value.trim();
                const lastName = document.getElementById('signupLastName').value.trim();
                const phone = signupPhone.value.replace(/\D/g, '');
                const email = document.getElementById('signupEmail').value.trim();
                const college = document.getElementById('signupCollege').value;

                if (!firstName || !lastName || !phone || !email) {
                    alert('Please fill in all signup fields.');
                    return;
                }

                const fullName = `${firstName} ${lastName}`.trim();

                localStorage.setItem('campCalUser', fullName);
                localStorage.setItem('campCalProfileFirstName', firstName);
                localStorage.setItem('campCalProfileLastName', lastName);
                localStorage.setItem('campCalProfilePhone', phone);
                localStorage.setItem('campCalProfileEmail', email);
                localStorage.setItem('campCalProfileCollege', college);

                window.location.href = 'profileSettings.html';
            });

            goToLogin.addEventListener('click', () => {
                window.location.href = 'auth.html';
            });
        });
    </script>
</body>
</html>
