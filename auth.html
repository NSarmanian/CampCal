<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampCal | Login or Sign Up</title>
    <link rel="stylesheet" href="includes/style.css" />
</head>
<body>
    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome to CampCal</h2>
            <p>Log in or create an account</p>

            <input id="nameInput" type="text" placeholder="Enter your name" />

            <button id="loginButton" class="auth-btn auth-btn-primary">Log In</button>
            <button id="signupButton" class="auth-btn auth-btn-secondary">Go to Sign Up</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');
            const nameInput = document.getElementById('nameInput');
            const loginButton = document.getElementById('loginButton');
            const signupButton = document.getElementById('signupButton');

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }

            loginButton.addEventListener('click', () => {
                const enteredName = nameInput.value.trim();

                if (enteredName !== '') {
                    localStorage.setItem('campCalUser', enteredName);
                    window.location.href = 'profilePreferences.html';
                } else {
                    alert('Please enter your name before logging in.');
                }
            });

            signupButton.addEventListener('click', () => {
                window.location.href = 'signup.html';
            });
        });
    </script>
</body>
</html>
