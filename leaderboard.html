<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampCal | Leaderboard</title>
    <link rel="stylesheet" href="includes/style.css" />
</head>
<body>
    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <main class="leaderboard-shell">
        <section class="leaderboard-panel">
            <div class="leaderboard-page-header">
                <div>
                    <p class="leaderboard-kicker">Campus competition</p>
                    <h1>Current Semester Leaderboard</h1>
                </div>
                <div class="leaderboard-season-chip" id="leaderboardSeasonLabel">Season</div>
            </div>

            <p class="leaderboard-note">Leaderboard points reset at each semester rollover and archived in profile settings.</p>

            <div id="leaderboardPageList" class="leaderboard-list leaderboard-list-page"></div>
        </section>
    </main>

    <script src="src/gamification.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.CampCalGamification) {
                window.CampCalGamification.init();
            }

            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');
            const leaderboardSeasonLabel = document.getElementById('leaderboardSeasonLabel');
            const leaderboardPageList = document.getElementById('leaderboardPageList');

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }

            if (!window.CampCalGamification) {
                leaderboardPageList.innerHTML = '<p class="points-empty">Leaderboard is unavailable right now.</p>';
                return;
            }

            const leaderboard = window.CampCalGamification.getLeaderboard({
                scope: 'semester',
                limit: 25
            });

            leaderboardSeasonLabel.textContent = leaderboard.semesterId;

            if (!leaderboard.entries.length) {
                leaderboardPageList.innerHTML = '<p class="points-empty">No scores posted yet.</p>';
                return;
            }

            leaderboardPageList.innerHTML = leaderboard.entries.map(entry => {
                const isCurrentUser = savedName && entry.userName === savedName;
                return `
                    <div class="leaderboard-row leaderboard-row-page ${isCurrentUser ? 'leaderboard-row-current' : ''}">
                        <span class="leaderboard-rank">#${entry.rank}</span>
                        <span class="leaderboard-user">${entry.userName}</span>
                        <strong class="leaderboard-score">${entry.semesterPoints}</strong>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
