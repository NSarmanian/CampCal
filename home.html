<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampCal</title>
    <link rel="stylesheet" href="includes/style.css" />
</head>
<body>
    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h2>Upcoming Events</h2>
            <div class="event-list" id="upcomingEvents"></div>
        </aside>

        <main class="calendar-section">
            <h2>Your Calendar</h2>

            <div class="calendar-box">
                <div class="calendar-header">
                    <button type="button" id="prevMonthBtn">&lt;</button>
                    <span id="calendarMonthLabel">March 2026</span>
                    <button type="button" id="nextMonthBtn">&gt;</button>
                </div>

                <div class="calendar-weekdays">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>

                <div class="calendar-grid real-calendar-grid" id="calendarGrid"></div>
            </div>

            <div class="selected-day" id="selectedDayPanel">
                <h3 id="selectedDayHeading">Selected Day</h3>
                <div id="selectedDayEvents"></div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }

            let allEvents = [];

            const categoryClasses = {
                sports: 'event-chip sports',
                wellness: 'event-chip wellness',
                academic: 'event-chip academic',
                social: 'event-chip social',
                education: 'event-chip education',
                music: 'event-chip music',
                workshop: 'event-chip workshop',
                seminar: 'event-chip seminar',
                creative: 'event-chip default',
                arts: 'event-chip default',
                outdoor: 'event-chip default',
                community: 'event-chip default',
                service: 'event-chip default',
                career: 'event-chip default',
                lifestyle: 'event-chip default',
                games: 'event-chip default'
            };

            let currentDate = new Date();
            let selectedDateStr = formatDateLocal(new Date());

            const calendarGrid = document.getElementById('calendarGrid');
            const calendarMonthLabel = document.getElementById('calendarMonthLabel');
            const selectedDayHeading = document.getElementById('selectedDayHeading');
            const selectedDayEvents = document.getElementById('selectedDayEvents');
            const upcomingEvents = document.getElementById('upcomingEvents');
            const prevMonthBtn = document.getElementById('prevMonthBtn');
            const nextMonthBtn = document.getElementById('nextMonthBtn');

            function formatDateLocal(dateObj) {
                const year = dateObj.getFullYear();
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const day = String(dateObj.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            function formatReadableDate(dateStr) {
                const dateObj = new Date(`${dateStr}T00:00:00`);
                return dateObj.toLocaleDateString('en-US', {
                    weekday: 'long',
                    month: 'long',
                    day: 'numeric',
                    year: 'numeric'
                });
            }

            function formatTime(timeStr) {
                if (!timeStr) return '';
                const [hourStr, minute] = timeStr.split(':');
                let hour = parseInt(hourStr, 10);
                const ampm = hour >= 12 ? 'PM' : 'AM';
                hour = hour % 12 || 12;
                return `${hour}:${minute} ${ampm}`;
            }

            function sortEventsByDateTime(events) {
                return [...events].sort((a, b) => {
                    const aDate = new Date(`${a.date}T${a.time || '00:00'}:00`);
                    const bDate = new Date(`${b.date}T${b.time || '00:00'}:00`);
                    return aDate - bDate;
                });
            }

            function getEventsForDate(dateStr) {
                return sortEventsByDateTime(
                    allEvents.filter(event => event.date === dateStr)
                );
            }

            async function loadAllEvents() {
                try {
                    const response = await fetch('events.json');
                    const jsonData = await response.json();

                    const starterEvents = jsonData.events || [];
                    const createdEvents = JSON.parse(localStorage.getItem('campCalCreatedEvents')) || [];

                    return [...starterEvents, ...createdEvents];
                } catch (error) {
                    console.error('Failed to load events.json:', error);
                    const createdEvents = JSON.parse(localStorage.getItem('campCalCreatedEvents')) || [];
                    return [...createdEvents];
                }
            }

            function renderUpcomingEvents() {
                const todayStr = formatDateLocal(new Date());

                const upcoming = sortEventsByDateTime(
                    allEvents.filter(event => {
                        const eventDateTime = new Date(`${event.date}T${event.time || '00:00'}:00`);
                        const todayDateTime = new Date(`${todayStr}T00:00:00`);
                        return eventDateTime >= todayDateTime;
                    })
                ).slice(0, 8);

                if (upcoming.length === 0) {
                    upcomingEvents.innerHTML = '<div class="no-events">No upcoming events.</div>';
                    return;
                }

                upcomingEvents.innerHTML = upcoming.map(event => `
                    <div class="event-card">
                        <div class="event-header">
                            <span>${event.title}</span>
                            <span>${formatTime(event.time)}</span>
                        </div>
                        <div class="event-meta">${formatReadableDate(event.date)}</div>
                        <div class="event-meta">${event.location}</div>
                    </div>
                `).join('');
            }

            function renderSelectedDay(dateStr) {
                selectedDateStr = dateStr;
                selectedDayHeading.textContent = `Selected Day: ${formatReadableDate(dateStr)}`;

                const events = getEventsForDate(dateStr);

                if (events.length === 0) {
                    selectedDayEvents.innerHTML = '<div class="no-events">No events for this day.</div>';
                    return;
                }

                selectedDayEvents.innerHTML = events.map(event => `
                    <div class="event-row">
                        <div>
                            <strong>${event.title}</strong><br>
                            <small>${event.location}</small>
                        </div>
                        <div>${formatTime(event.time)}</div>
                    </div>
                `).join('');
            }

            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);

                const startDayIndex = firstDay.getDay();
                const daysInMonth = lastDay.getDate();

                calendarMonthLabel.textContent = firstDay.toLocaleDateString('en-US', {
                    month: 'long',
                    year: 'numeric'
                });

                calendarGrid.innerHTML = '';

                for (let i = 0; i < startDayIndex; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'calendar-day empty';
                    calendarGrid.appendChild(emptyCell);
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const cellDate = new Date(year, month, day);
                    const dateStr = formatDateLocal(cellDate);
                    const dayEvents = getEventsForDate(dateStr);

                    const cell = document.createElement('div');
                    cell.className = 'calendar-day';

                    if (dateStr === formatDateLocal(new Date())) {
                        cell.classList.add('today');
                    }

                    if (dateStr === selectedDateStr) {
                        cell.classList.add('selected');
                    }

                    const dayNumber = document.createElement('div');
                    dayNumber.className = 'calendar-day-number';
                    dayNumber.textContent = day;
                    cell.appendChild(dayNumber);

                    const eventStack = document.createElement('div');
                    eventStack.className = 'calendar-event-stack';

                    dayEvents.slice(0, 2).forEach(event => {
                        const chip = document.createElement('div');
                        chip.className = categoryClasses[event.category] || 'event-chip default';
                        chip.textContent = event.title;
                        eventStack.appendChild(chip);
                    });

                    if (dayEvents.length > 2) {
                        const more = document.createElement('div');
                        more.className = 'more-events';
                        more.textContent = `+${dayEvents.length - 2} more`;
                        eventStack.appendChild(more);
                    }

                    cell.appendChild(eventStack);

                    cell.addEventListener('click', () => {
                        renderSelectedDay(dateStr);
                        renderCalendar();
                    });

                    calendarGrid.appendChild(cell);
                }
            }

            prevMonthBtn.addEventListener('click', () => {
                currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
                renderCalendar();
            });

            nextMonthBtn.addEventListener('click', () => {
                currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
                renderCalendar();
            });

            loadAllEvents().then(events => {
                allEvents = events;

                if (!allEvents.some(event => event.date === selectedDateStr)) {
                    const sorted = sortEventsByDateTime(allEvents);
                    if (sorted.length > 0) {
                        selectedDateStr = sorted[0].date;
                        currentDate = new Date(`${sorted[0].date}T00:00:00`);
                    }
                }

                renderUpcomingEvents();
                renderSelectedDay(selectedDateStr);
                renderCalendar();
            });
        });
    </script>
</body>
</html>
