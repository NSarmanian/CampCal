<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>CampCal</title>
    <link rel="stylesheet" href="includes/style.css" />
    <script type="module" src="src/eventList.js" defer></script>
    <script type="module" src="src/calLibrary.js" defer></script>
</head>
<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">

        <!-- LEFT: EVENTS -->
        <aside class="sidebar">
            <h2>Upcoming Events</h2>
            <div class="event-list"></div>
        </aside>

        <!-- RIGHT: CALENDAR -->
        <main class="calendar-section">
        <h2>Your Calendar</h2>

        <div class="calendar-box">
            <div class="calendar-header">
                <button>&lt;</button>
                <span>March</span>
                <button>&gt;</button>
            </div>

            <div class="calendar-grid">
                <div class="day"></div>
                <div class="day"></div>
                <div class="day active"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day active"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day active"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day active"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day active"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day active"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day"></div>
                <div class="day active"></div>
                <div class="day"></div>
                <div class="day"></div>
            </div>
        </div>

        <div class="selected-day">
            <h3>Selected Day: March 26</h3>

            <div class="event-row">
            <span>Julia’s Birthday</span>
            <span>5:00pm Demoss</span>
            </div>

            <div class="event-row">
            <span>Party at the Hill</span>
            <span>8:13pm Hill</span>
            </div>

            <div class="no-events">No more events...</div>
        </div>
        </main>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }
        });
    </script>
</body>
</html>
