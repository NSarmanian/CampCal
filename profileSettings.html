<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampCal | Profile Settings</title>
    <link rel="stylesheet" href="includes/style.css" />
</head>
<body>
    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <main class="profile-settings-shell">
        <section class="profile-form-panel">
            <h1>Complete Profile</h1>

            <label for="first-name">First name</label>
            <input id="first-name" type="text" placeholder="John" />

            <label for="last-name">Last name</label>
            <input id="last-name" type="text" placeholder="Smith" />

            <label for="phone">Phone Number</label>
            <input id="phone" type="text" placeholder="(434) 123-4567" />

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="example@email.com" />

            <label for="college">College</label>
            <select id="college">
                <option>Liberty University</option>
                <option>University of Virginia</option>
                <option>Virginia Tech</option>
            </select>

            <button class="profile-submit" id="saveProfileBtn">Save Profile</button>
            <a class="profile-secondary-link" href="profilePreferences.html">Go to Profile Preferences</a>
        </section>

        <section class="profile-calendar-panel">
            <h2>Liberty University Calendar</h2>

            <div class="calendar-box profile-calendar-box">
                <div class="calendar-header">
                    <button type="button" id="profilePrevMonth" aria-label="Previous month">&lt;</button>
                    <span id="profileMonthLabel">Month Year</span>
                    <button type="button" id="profileNextMonth" aria-label="Next month">&gt;</button>
                </div>

                <div class="profile-calendar-weekdays">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>

                <div class="profile-calendar-grid-real" id="profileCalendarGrid"></div>
            </div>

            <div class="selected-day profile-selected-day">
                <h3 id="profileSelectedHeading">Selected Day</h3>
                <div id="profileSelectedEvents"></div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }

            const firstNameInput = document.getElementById('first-name');
            const lastNameInput = document.getElementById('last-name');
            const phoneInput = document.getElementById('phone');
            const emailInput = document.getElementById('email');
            const collegeInput = document.getElementById('college');
            const saveProfileBtn = document.getElementById('saveProfileBtn');

            function formatPhoneNumber(value) {
                const digits = value.replace(/\D/g, '').substring(0, 10);

                const part1 = digits.substring(0, 3);
                const part2 = digits.substring(3, 6);
                const part3 = digits.substring(6, 10);

                if (digits.length > 6) {
                    return `(${part1}) ${part2}-${part3}`;
                } else if (digits.length > 3) {
                    return `(${part1}) ${part2}`;
                } else if (digits.length > 0) {
                    return `(${part1}`;
                }

                return '';
            }

            firstNameInput.value = localStorage.getItem('campCalProfileFirstName') || '';
            lastNameInput.value = localStorage.getItem('campCalProfileLastName') || '';
            phoneInput.value = formatPhoneNumber(
                localStorage.getItem('campCalProfilePhone') || ''
            );
            phoneInput.addEventListener('input', () => {
                phoneInput.value = formatPhoneNumber(phoneInput.value);
            });
            emailInput.value = localStorage.getItem('campCalProfileEmail') || '';
            collegeInput.value = localStorage.getItem('campCalProfileCollege') || 'Liberty University';

            saveProfileBtn.addEventListener('click', () => {
                localStorage.setItem('campCalProfileFirstName', firstNameInput.value.trim());
                localStorage.setItem('campCalProfileLastName', lastNameInput.value.trim());
                const rawPhone = phoneInput.value.replace(/\D/g, '');
                localStorage.setItem('campCalProfilePhone', rawPhone);
                localStorage.setItem('campCalProfileEmail', emailInput.value.trim());
                localStorage.setItem('campCalProfileCollege', collegeInput.value);

                const fullName = `${firstNameInput.value.trim()} ${lastNameInput.value.trim()}`.trim();
                if (fullName) {
                    localStorage.setItem('campCalUser', fullName);
                }

                alert('Profile saved.');
            });

            let allEvents = [];
            let profileCurrentDate = new Date();
            let selectedDateStr = formatDateLocal(new Date());

            const profileCalendarGrid = document.getElementById('profileCalendarGrid');
            const profileMonthLabel = document.getElementById('profileMonthLabel');
            const profileSelectedHeading = document.getElementById('profileSelectedHeading');
            const profileSelectedEvents = document.getElementById('profileSelectedEvents');
            const profilePrevMonth = document.getElementById('profilePrevMonth');
            const profileNextMonth = document.getElementById('profileNextMonth');

            function formatDateLocal(dateObj) {
                const year = dateObj.getFullYear();
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const day = String(dateObj.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            function formatReadableDate(dateStr) {
                const dateObj = new Date(`${dateStr}T00:00:00`);
                return dateObj.toLocaleDateString('en-US', {
                    month: 'long',
                    day: 'numeric',
                    year: 'numeric'
                });
            }

            function formatTime(timeStr) {
                if (!timeStr) return '';
                const [hourStr, minute] = timeStr.split(':');
                let hour = parseInt(hourStr, 10);
                const ampm = hour >= 12 ? 'PM' : 'AM';
                hour = hour % 12 || 12;
                return `${hour}:${minute} ${ampm}`;
            }

            function getEventsForDate(dateStr) {
                return allEvents
                    .filter(event => event.date === dateStr)
                    .sort((a, b) => {
                        return new Date(`${a.date}T${a.time || '00:00'}:00`) -
                               new Date(`${b.date}T${b.time || '00:00'}:00`);
                    });
            }

            async function loadAllEvents() {
                try {
                    const response = await fetch('events.json');
                    const jsonData = await response.json();

                    const starterEvents = jsonData.events || [];
                    const createdEvents = JSON.parse(localStorage.getItem('campCalCreatedEvents')) || [];

                    allEvents = [...starterEvents, ...createdEvents];
                } catch (error) {
                    console.error('Failed to load events.json:', error);
                    const createdEvents = JSON.parse(localStorage.getItem('campCalCreatedEvents')) || [];
                    allEvents = [...createdEvents];
                }

                const firstEventDate = allEvents.length
                    ? allEvents
                        .slice()
                        .sort((a, b) => {
                            return new Date(`${a.date}T${a.time || '00:00'}:00`) -
                                   new Date(`${b.date}T${b.time || '00:00'}:00`);
                        })[0].date
                    : formatDateLocal(new Date());

                if (!allEvents.some(event => event.date === selectedDateStr)) {
                    selectedDateStr = firstEventDate;
                    profileCurrentDate = new Date(`${firstEventDate}T00:00:00`);
                }

                renderProfileSelectedDay(selectedDateStr);
                renderProfileCalendar();
            }

            function renderProfileSelectedDay(dateStr) {
                selectedDateStr = dateStr;
                profileSelectedHeading.textContent = `Selected Day: ${formatReadableDate(dateStr)}`;

                const dayEvents = getEventsForDate(dateStr);

                if (dayEvents.length === 0) {
                    profileSelectedEvents.innerHTML = '<div class="no-events">No events for this day.</div>';
                    return;
                }

                profileSelectedEvents.innerHTML = dayEvents.map(event => `
                    <div class="event-row">
                        <div>
                            <strong>${event.title}</strong><br>
                            <small>${event.location}</small>
                        </div>
                        <div>${formatTime(event.time)}</div>
                    </div>
                `).join('');
            }

            function renderProfileCalendar() {
                const year = profileCurrentDate.getFullYear();
                const month = profileCurrentDate.getMonth();

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startDayIndex = firstDay.getDay();
                const daysInMonth = lastDay.getDate();

                profileMonthLabel.textContent = firstDay.toLocaleDateString('en-US', {
                    month: 'long',
                    year: 'numeric'
                });

                profileCalendarGrid.innerHTML = '';

                for (let i = 0; i < startDayIndex; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'profile-mini-day empty';
                    profileCalendarGrid.appendChild(emptyCell);
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const cellDate = new Date(year, month, day);
                    const dateStr = formatDateLocal(cellDate);
                    const dayEvents = getEventsForDate(dateStr);

                    const cell = document.createElement('div');
                    cell.className = 'profile-mini-day';

                    if (dateStr === formatDateLocal(new Date())) {
                        cell.classList.add('today');
                    }

                    if (dateStr === selectedDateStr) {
                        cell.classList.add('selected');
                    }

                    cell.innerHTML = `
                        <span class="profile-mini-day-number">${day}</span>
                        ${dayEvents.length > 0 ? '<span class="profile-mini-marker"></span>' : ''}
                    `;

                    cell.addEventListener('click', () => {
                        renderProfileSelectedDay(dateStr);
                        renderProfileCalendar();
                    });

                    profileCalendarGrid.appendChild(cell);
                }
            }

            profilePrevMonth.addEventListener('click', () => {
                profileCurrentDate = new Date(
                    profileCurrentDate.getFullYear(),
                    profileCurrentDate.getMonth() - 1,
                    1
                );
                renderProfileCalendar();
            });

            profileNextMonth.addEventListener('click', () => {
                profileCurrentDate = new Date(
                    profileCurrentDate.getFullYear(),
                    profileCurrentDate.getMonth() + 1,
                    1
                );
                renderProfileCalendar();
            });

            loadAllEvents();
        });
    </script>
    
</body>
</html>
