<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Creation</title>
    <link rel="stylesheet" href="includes/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <div class="event-creation-container">
        <h1>Event Creation</h1>

        <form id="eventForm">
            <div class="form-grid">
                <div class="fields-column">
                    <div class="form-group">
                        <label for="eventName">Event Name</label>
                        <input type="text" id="eventName" placeholder="Enter Event Name" required>
                    </div>

                    <div class="form-group">
                        <label for="eventDate">Date</label>
                        <input type="date" id="eventDate" required>
                    </div>

                    <div class="form-group">
                        <label>Time</label>
                        <div class="time-row">
                            <div class="time-label-small">Start Time</div>
                            <div class="time-dial-container">
                                <select id="startHour" required>
                                    <option>12</option><option>01</option><option>02</option><option>03</option>
                                    <option>04</option><option>05</option><option>06</option><option>07</option>
                                    <option>08</option><option>09</option><option>10</option><option>11</option>
                                </select>
                                <span>:</span>
                                <select id="startMin" required>
                                    <option>00</option><option>15</option><option>30</option><option>45</option>
                                </select>
                                <select id="startAmpm" required>
                                    <option>AM</option>
                                    <option>PM</option>
                                </select>
                            </div>

                            <div class="time-label-small">End Time</div>
                            <div class="time-dial-container">
                                <select id="endHour" required>
                                    <option>12</option><option>01</option><option>02</option><option>03</option>
                                    <option>04</option><option>05</option><option>06</option><option>07</option>
                                    <option>08</option><option>09</option><option>10</option><option>11</option>
                                </select>
                                <span>:</span>
                                <select id="endMin" required>
                                    <option>00</option><option>15</option><option>30</option><option>45</option>
                                </select>
                                <select id="endAmpm" required>
                                    <option>AM</option>
                                    <option>PM</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="eventLocation">Location</label>
                        <input type="text" id="eventLocation" placeholder="Enter Location" required>
                    </div>

                    <div class="form-group">
                        <label for="eventType">Event Type</label>
                        <select id="eventType" required>
                            <option value="" disabled selected>Select Event Type</option>
                            <option value="workshop">Workshop</option>
                            <option value="seminar">Seminar</option>
                            <option value="social">Social Gathering</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="targetAudience">Target Audience</label>
                        <select id="targetAudience" required>
                            <option value="" disabled selected>Select Audience</option>
                            <option value="students">Students</option>
                            <option value="professionals">Professionals</option>
                            <option value="faculty">Faculty</option>
                        </select>
                    </div>
                </div>

                <div class="details-column">
                    <div class="form-group">
                        <label for="eventDetails">Event Details</label>
                        <textarea id="eventDetails" placeholder="Enter Event Details" required></textarea>
                    </div>
                </div>
            </div>

            <p id="formMessage" class="form-message"></p>

            <div class="button-row">
                <button type="button" class="btn-link" id="cancelBtn">Cancel</button>
                <button type="submit" class="btn-link">Create</button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');
            const form = document.getElementById('eventForm');
            const formMessage = document.getElementById('formMessage');
            const cancelBtn = document.getElementById('cancelBtn');

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }

            cancelBtn.addEventListener('click', () => {
                window.location.href = 'home.html';
            });

            function convertTo24Hour(hour, minute, ampm) {
                let h = parseInt(hour, 10);

                if (ampm === 'AM' && h === 12) h = 0;
                if (ampm === 'PM' && h !== 12) h += 12;

                return `${String(h).padStart(2, '0')}:${minute}`;
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const title = document.getElementById('eventName').value.trim();
                const date = document.getElementById('eventDate').value;
                const location = document.getElementById('eventLocation').value.trim();
                const category = document.getElementById('eventType').value;
                const audience = document.getElementById('targetAudience').value;
                const description = document.getElementById('eventDetails').value.trim();

                const startTime = convertTo24Hour(
                    document.getElementById('startHour').value,
                    document.getElementById('startMin').value,
                    document.getElementById('startAmpm').value
                );

                const endTime = convertTo24Hour(
                    document.getElementById('endHour').value,
                    document.getElementById('endMin').value,
                    document.getElementById('endAmpm').value
                );

                if (!title || !date || !location || !category || !audience || !description) {
                    formMessage.textContent = 'Please fill in all fields.';
                    formMessage.className = 'form-message error';
                    return;
                }

                const startDateTime = new Date(`${date}T${startTime}:00`);
                const endDateTime = new Date(`${date}T${endTime}:00`);

                if (endDateTime <= startDateTime) {
                    formMessage.textContent = 'End time must be later than start time.';
                    formMessage.className = 'form-message error';
                    return;
                }

                const storedEvents = JSON.parse(localStorage.getItem('campCalCreatedEvents')) || [];

                const newEvent = {
                    id: Date.now(),
                    title,
                    date,
                    time: startTime,
                    endTime,
                    location,
                    description,
                    category,
                    audience,
                    tags: [category, audience]
                };

                storedEvents.push(newEvent);
                localStorage.setItem('campCalCreatedEvents', JSON.stringify(storedEvents));

                formMessage.textContent = 'Event created successfully!';
                formMessage.className = 'form-message success';

                form.reset();

                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 800);
            });
        });
    </script>

</body>
</html>
