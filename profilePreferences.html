<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>CampCal | Profile Preferences</title>
    <link rel="stylesheet" href="includes/style.css" />

    <style>
        body.dark-theme {
            background-color: #121212;
            color: #f5f5f5;
        }

        body.dark-theme .navbar,
        body.dark-theme .card,
        body.dark-theme .profile-container {
            background-color: #1e1e1e;
            color: #f5f5f5;
        }

        body.dark-theme a {
            color: #f5f5f5;
        }

        body.dark-theme select,
        body.dark-theme input,
        body.dark-theme button {
            background-color: #2c2c2c;
            color: #f5f5f5;
            border: 1px solid #555;
        }

        .logout-btn,
        .login-btn {
            margin-top: 10px;
            width: 100%;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .logout-btn {
            background-color: #c0392b;
            color: white;
        }

        .login-btn {
            background-color: #3498db;
            color: white;
        }

        .logout-btn:hover,
        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="auth.html">Log In</a></div>
    </header>

    <div class="container">
        <div class="profile-container">
            <div class="profile-preferences-header">
                <h1 id="welcomeHeading">Welcome</h1>
                <a class="cta-button" href="profileSettings.html">Back to Profile Settings</a>
            </div>

            <div class="profile-grid">

                <div class="card">
                    <h2>My Profile</h2>
                    <p id="profileName">Name: Not provided</p>
                    <p id="profileEmail">Email: Not provided</p>
                    <p id="profilePhone">Phone: Not provided</p>
                    <p id="profileCollege">College: Not provided</p>
                </div>

                <div class="card">
                    <h2>Preferences</h2>

                    <label for="themeSelect">Theme</label>
                    <select id="themeSelect">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>

                    <label for="notificationType">Notification Type</label>
                    <select id="notificationType">
                        <option>Banner</option>
                    </select>
                </div>

                <div class="card">
                    <h2>Notification Settings</h2>
                    <label for="allEventsSetting">All Events</label>
                    <select id="allEventsSetting">
                        <option>Enabled</option>
                        <option>Disabled</option>
                    </select>
                </div>

                <div class="card">
                    <h2>Account</h2>
                    <p>Manage your session</p>
                    <button id="loginBtn" class="login-btn">Log In</button>
                    <button id="logoutBtn" class="logout-btn">Log Out</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('campCalUser');
            const userLink = document.querySelector('.user a');
            const welcomeHeading = document.getElementById('welcomeHeading');
            const themeSelect = document.getElementById('themeSelect');
            const logoutBtn = document.getElementById('logoutBtn');
            const loginBtn = document.getElementById('loginBtn');

            const profileName = document.getElementById('profileName');
            const profileEmail = document.getElementById('profileEmail');
            const profilePhone = document.getElementById('profilePhone');
            const profileCollege = document.getElementById('profileCollege');

            // 🔥 Phone formatter (ADDED)
            function formatPhoneNumber(value) {
                const digits = value.replace(/\D/g, '').substring(0, 10);

                const part1 = digits.substring(0, 3);
                const part2 = digits.substring(3, 6);
                const part3 = digits.substring(6, 10);

                if (digits.length > 6) {
                    return `(${part1}) ${part2}-${part3}`;
                } else if (digits.length > 3) {
                    return `(${part1}) ${part2}`;
                } else if (digits.length > 0) {
                    return `(${part1}`;
                }

                return '';
            }

            if (userLink) {
                if (savedName) {
                    userLink.textContent = `Welcome, ${savedName}`;
                    userLink.href = 'profilePreferences.html';
                } else {
                    userLink.textContent = 'Log In';
                    userLink.href = 'auth.html';
                }
            }

            if (savedName && welcomeHeading) {
                welcomeHeading.textContent = `Welcome, ${savedName}`;
            } else if (welcomeHeading) {
                welcomeHeading.textContent = 'Welcome';
            }

            const savedTheme = localStorage.getItem('campCalTheme') || 'light';
            themeSelect.value = savedTheme;

            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
            }

            themeSelect.addEventListener('change', () => {
                const selectedTheme = themeSelect.value;
                localStorage.setItem('campCalTheme', selectedTheme);

                if (selectedTheme === 'dark') {
                    document.body.classList.add('dark-theme');
                } else {
                    document.body.classList.remove('dark-theme');
                }
            });

            loginBtn.addEventListener('click', () => {
                window.location.href = 'auth.html';
            });

            logoutBtn.addEventListener('click', () => {
                // Remove user + theme
                localStorage.removeItem('campCalUser');
                localStorage.removeItem('campCalTheme');

                // Remove saved profile info
                localStorage.removeItem('campCalProfileFirstName');
                localStorage.removeItem('campCalProfileLastName');
                localStorage.removeItem('campCalProfilePhone');
                localStorage.removeItem('campCalProfileEmail');
                localStorage.removeItem('campCalProfileCollege');

                window.location.href = 'home.html';
            });

            if (savedName) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
            } else {
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
            }

            const firstName = localStorage.getItem('campCalProfileFirstName') || '';
            const lastName = localStorage.getItem('campCalProfileLastName') || '';
            const email = localStorage.getItem('campCalProfileEmail') || '';
            const phone = localStorage.getItem('campCalProfilePhone') || '';
            const college = localStorage.getItem('campCalProfileCollege') || '';

            const fullName = `${firstName} ${lastName}`.trim();

            // 🔥 Format phone before display (FIX)
            const formattedPhone = formatPhoneNumber(phone);

            profileName.textContent = `Name: ${fullName || 'Not provided'}`;
            profileEmail.textContent = `Email: ${email || 'Not provided'}`;
            profilePhone.textContent = `Phone: ${formattedPhone || 'Not provided'}`;
            profileCollege.textContent = `College: ${college || 'Not provided'}`;
        });
    </script>

</body>
</html>
