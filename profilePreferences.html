<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>CampCal | Profile Preferences</title>
    <link rel="stylesheet" href="includes/style.css" />
</head>
<body>

    <header class="navbar">
        <div class="logo">CampCal</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="home.html">Calendar</a>
            <a href="eventCreation.html">Create Event</a>
            <a href="profileSettings.html">User Profile</a>
        </nav>
        <div class="user"><a href="profileSettings.html">Welcome, Schall</a></div>
    </header>

    <div class="container">
        <div class="profile-container">
            <div class="profile-preferences-header">
                <h1>Welcome, Schall</h1>
                <a class="cta-button" href="profileSettings.html">Back to Profile Settings</a>
            </div>

            <div class="profile-grid">

                <div class="card">
                    <h2>My Profile</h2>
                    <p>Email: example@email.com</p>
                    <p>Phone: 123-456-7890</p>
                    <p>College: Liberty University</p>
                </div>

                <div class="card">
                    <h2>Preferences</h2>
                    <label>Theme</label>
                    <select><option>Light</option></select>

                    <label>Notification Type</label>
                    <select><option>Banner</option></select>
                </div>

                <div class="card">
                    <h2>Notification Settings</h2>
                    <label>All Events</label>
                    <select><option>Enabled</option></select>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
